spring.datasource.url=jdbc:postgresql://localhost:5432/lifestats
spring.datasource.username=lifestats
spring.datasource.password=lifestats
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.liquibase.change-log=classpath:db/changelog/master.xml

server.port=8080

lifestats.security.jwt.secret=${JWT_SECRET}
lifestats.security.jwt.expirationMinutes=${JWT_EXP_MINUTES:60}