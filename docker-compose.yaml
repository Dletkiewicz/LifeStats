services:

  postgres:
    image: postgres:16
    container_name: lifestats-postgres
    restart: always
    environment:
      POSTGRES_DB: lifestats
      POSTGRES_USER: lifestats
      POSTGRES_PASSWORD: lifestats
    ports:
      - "5432:5432"
    volumes:
      - lifestats-db-data:/var/lib/postgresql/data

  app:
    build: .
    container_name: lifestats-app
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lifestats
      SPRING_DATASOURCE_USERNAME: lifestats
      SPRING_DATASOURCE_PASSWORD: lifestats
    ports:
      - "8080:8080"
    env_file:
      - .env

volumes:
  lifestats-db-data: